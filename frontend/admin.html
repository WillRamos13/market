<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - FashMarket</title>
    <link rel="stylesheet" href="admin.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="header">
    <h1>Panel de Administración</h1>
</header>

<main class="container">

    <!-- FORMULARIO -->
    <section class="form-section">
        <h2>Agregar Producto</h2>

        <form id="formProducto">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Ej: Polo Nike">

            <label>Precio</label>
            <input type="number" id="precio" placeholder="Ej: 49.90">

            <label>Descripción</label>
            <textarea id="descripcion" placeholder="Descripción del producto"></textarea>

            <label>Imagen (URL)</label>
            <input type="text" id="imagen" placeholder="https://...">

            <button type="submit">Guardar Producto</button>
        </form>
    </section>

    <!-- LISTA -->
    <section class="list-section">
        <h2>Productos</h2>

        <div class="products">

            <!-- EJEMPLO CARD -->
            <article class="card">
                <img src="img/oferta1.png" alt="producto">
                <h3>Polo Deportivo</h3>
                <p>Producto de ejemplo</p>
                <span>S/. 50</span>
            </article>

            <article class="card">
                <img src="img/oferta2.png" alt="producto">
                <h3>Zapatillas</h3>
                <p>Producto de ejemplo</p>
                <span>S/. 120</span>
            </article>

        </div>
    </section>

</main>

</body>
</html>
