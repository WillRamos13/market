<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - FashMarket</title>
    <link rel="stylesheet" href="admin.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <header id="superior">
        <img id="propaganda" src="img/tienda.png">
    </header>

    <header id="cabecera">
        <img id="logo" src="img/image.png">
        <h1 id="titulo">FashMarket</h1>

        <nav id="menu">
            <ul>
                <li id="servicio">☰
                    <ul>
                        <li class="submenu">Trabaja con nosotros</li>
                        <li><a class="submenu" href="https://www.youtube.com/?app=desktop&hl=es">Perfil</a></li>
                        <li><a class="submenu" href="admin.html">Panel administrativo</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

<main class="container">

    <section class="form-section">
        <h2>Agregar Producto</h2>

        <form id="formProducto">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Ej: Polo Nike" required>

            <label for="precio">Precio</label>
            <input type="number" id="precio" placeholder="Ej: 49.90" required>

            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" placeholder="Descripción del producto" required></textarea>

            <label for="imagen">Imagen (URL)</label>
            <input type="text" id="imagen" placeholder="https://..." required>

            <button type="submit">Guardar Producto</button>
        </form>
    </section>

    <section class="list-section">
        <h2>Productos</h2>

        <div class="products" id="listaProductos">

        </div>
    </section>

</main>

<script src="admin.js"></script>
</body>
</html>
